<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Emotion Predictor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: grid;
            place-items: center;
            min-height: 90vh;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            background: #ffffff;
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 2rem;
        }
        input[type="file"] {
            margin-bottom: 1.5rem;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #2980b9;
        }
        #result {
            margin-top: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #e74c3c;
        }
        #result.loading {
            color: #f39c12;
        }
        #confidence {
            font-size: 1rem;
            color: #7f8c8d;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Upload Audio to Predict Emotion</h1>
        <input type="file" id="audioFileInput" accept="audio/*">
        <br>
        <button id="predictButton">Predict</button>
        <div id="result"></div>
        <div id="confidence"></div>
    </div>

    <script>
        const predictButton = document.getElementById('predictButton');
        const audioFileInput = document.getElementById('audioFileInput');
        const resultDiv = document.getElementById('result');
        const confidenceDiv = document.getElementById('confidence');

        predictButton.addEventListener('click', () => {
            const file = audioFileInput.files[0];
            if (!file) {
                resultDiv.textContent = 'Please select an audio file first.';
                confidenceDiv.textContent = '';
                return;
            }

            resultDiv.textContent = 'Predicting...';
            resultDiv.classList.add('loading');
            confidenceDiv.textContent = '';

            // Create form data to send the file
            const formData = new FormData();
            formData.append('audioFile', file);

            // Send the file to the Flask server's /predict endpoint
            fetch('/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                resultDiv.classList.remove('loading');
                if (data.error) {
                    resultDiv.textContent = 'Error: ' + data.error;
                    confidenceDiv.textContent = '';
                } else {
                    resultDiv.textContent = 'Predicted Emotion: ' + data.emotion;
                    confidenceDiv.textContent = 'Confidence: ' + data.confidence;
                }
            })
            .catch(error => {
                resultDiv.classList.remove('loading');
                resultDiv.textContent = 'An error occurred. See console.';
                confidenceDiv.textContent = '';
                console.error('Error:', error);
            });
        });
    </script>

</body>
</html>
